<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and logo -->
    <title>English janala</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- tailwind and daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- style -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-circle-question"></i> FAQ</a
                >
              </li>
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-book-open"></i> Learn</a
                >
              </li>
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-arrow-right-from-bracket"></i>
                  Logout</a
                >
              </li>
            </ul>
          </div>
          <a class="btn btn-ghost text-xl"
            >English <img src="assets/logo.png" alt="" /> Janala</a
          >
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-4">
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-circle-question"></i> FAQ</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-book-open"></i> Learn</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    

      <section
        id="hero"
        class="flex flex-col-reverse items-center md:flex-row md:justify-between w-11/12 mx-auto md:gap-12 py-20"
      >
        <div class="flex-1">
          <h2 class="text-5xl font-bold mb-4">
            <span class="text-[#00BCFF]">English</span> is Easy!!
          </h2>
          <p class="font-bangla text-2xl mb-4">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <fieldset class="fieldset space-y-3">
            <input type="txt" class="input outline-blue-600" placeholder="Enter Your Name" />

            <input type="password" class="input outline-blue-600" placeholder="Password" />

            <div class="flex flex-col items-start">
              <button class="btn btn-primary mt-4">Get started</button>
            </div>
          </fieldset>
        </div>
        <div class="flex-1">
          <img src="assets/hero-student.png" alt="" />
        </div>
      </section>

      <section class="py-5 w-11/12">
        <h2 class="text-5xl font-bold mb-4 text-center">
            <span class="text-[#00BCFF]">Let's</span> Learn Vocabularies
          </h2>

          <div id="level-container" class="flex gap-5 flex-wrap justify-center"></div>
      </section>

      <section id="word-container" class="bg-gray-200 w-11/12 rounded-2xl mx-auto p-3 md:p-10 my-10 grid grid-cols-2 gap-2 md:grid-cols-3 md:gap-5">
        
      </section>
    
    <script src="script/index.js"></script>
  </body>
</html>
